{{ define "main" }}
	<main>
		<article>
			<h1>{{ .Title }}</h1>
			<strong>Published:</strong> <time datetime="{{ .Date.Format "2006-01-02T15:04:05" }}">{{ .Date.Format "2006-01-02 15:04:05" }}</time>
			<br><strong>Read time:</strong> ~{{ .ReadingTime }} min
			<div>
				{{ .Content }}
			</div>
		</article>
	</main>
{{ end }}
